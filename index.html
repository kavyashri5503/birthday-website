    @keyframes bulbGlow {
      0%, 100% { opacity: 0.3; transform: scale(0.85); filter: brightness(0.6); box-shadow: 0 0 4px 1px currentColor; }
      33% { opacity: 1; transform: scale(1.1); filter: brightness(1.3); box-shadow: 0 0 12px 3px currentColor, 0 0 25px 5px currentColor; }
      66% { opacity: 0.3; transform: scale(0.85); filter: brightness(0.6); box-shadow: 0 0 4px 1px currentColor; }
    }

    /* ===== FLOATING PARTICLES ===== */
    .particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      width: 3px; height: 3px;
      background: rgba(242, 196, 111, 0.6);
      border-radius: 50%;
      animation: float 8s ease-in-out infinite;
    }
    .particle:nth-child(1) { top: 20%; left: 10%; animation-delay: 0s; animation-duration: 7s; }
    .particle:nth-child(2) { top: 60%; left: 85%; animation-delay: 1s; animation-duration: 9s; }
    .particle:nth-child(3) { top: 40%; left: 20%; animation-delay: 2s; animation-duration: 6s; }
    .particle:nth-child(4) { top: 80%; left: 60%; animation-delay: 3s; animation-duration: 8s; }
    .particle:nth-child(5) { top: 30%; left: 70%; animation-delay: 4s; animation-duration: 10s; }
    .particle:nth-child(6) { top: 70%; left: 30%; animation-delay: 0.5s; animation-duration: 7s; }
    .particle:nth-child(7) { top: 15%; left: 50%; animation-delay: 1.5s; animation-duration: 9s; }
    .particle:nth-child(8) { top: 55%; left: 40%; animation-delay: 2.5s; animation-duration: 6s; }
    .particle:nth-child(9) { top: 85%; left: 15%; animation-delay: 3.5s; animation-duration: 8s; }
    .particle:nth-child(10) { top: 45%; left: 90%; animation-delay: 4.5s; animation-duration: 7s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-80px) translateX(40px); opacity: 0; }
    }

    /* ===== SCATTERED FAIRY LIGHTS ===== */
    .lights {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    .light {
      position: absolute;
      width: 4px; height: 4px;
      background: #f2c46f;
      border-radius: 50%;
      box-shadow: 0 0 8px 2px rgba(242, 196, 111, 0.4),
                  0 0 20px 6px rgba(242, 196, 111, 0.15);
      animation: twinkle 3s ease-in-out infinite;
    }
    .light:nth-child(1) { top: 10%; left: 15%; animation-delay: 0s; }
    .light:nth-child(2) { top: 20%; left: 80%; animation-delay: 0.5s; }
    .light:nth-child(3) { top: 8%; left: 45%; animation-delay: 1s; }
    .light:nth-child(4) { top: 35%; left: 10%; animation-delay: 1.5s; }
    .light:nth-child(5) { top: 60%; left: 90%; animation-delay: 0.3s; }
    .light:nth-child(6) { top: 75%; left: 25%; animation-delay: 0.8s; }
    .light:nth-child(7) { top: 45%; left: 70%; animation-delay: 1.2s; }
    .light:nth-child(8) { top: 85%; left: 60%; animation-delay: 0.2s; }
    .light:nth-child(9) { top: 15%; left: 60%; animation-delay: 1.8s; }
    .light:nth-child(10) { top: 55%; left: 40%; animation-delay: 0.6s; }
    .light:nth-child(11) { top: 30%; left: 30%; animation-delay: 2s; }
    .light:nth-child(12) { top: 70%; left: 80%; animation-delay: 1.1s; }
    .light:nth-child(13) { top: 5%; left: 90%; animation-delay: 0.9s; }
    .light:nth-child(14) { top: 90%; left: 15%; animation-delay: 1.4s; }
    .light:nth-child(15) { top: 50%; left: 55%; animation-delay: 0.4s; }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    .glow {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(242, 196, 111, 0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: glowPulse 4s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    }

    .container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      position: relative;
      z-index: 1;
      gap: 4rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .content { flex: 1; text-align: left; }
    .greeting {
      font-family: 'Playfair Display', serif;
      font-size: 3.2rem;
      font-weight: 600;
      color: #f7f3eb;
      margin-bottom: 1rem;
      line-height: 1.2;
      text-shadow: 0 2px 15px rgba(242, 196, 111, 0.3);
      animation: textFade 1.5s ease-out;
    }
    .subtext {
      font-size: 1.3rem;
      color: #c7d0df;
      margin-bottom: 2.5rem;
      font-weight: 300;
      letter-spacing: 0.5px;
      animation: textFade 1.5s ease-out 0.3s both;
    }
    @keyframes textFade {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .cta-button {
      display: inline-block;
      padding: 1rem 2.5rem;
      background: linear-gradient(135deg, #f2c46f 0%, #d4a843 100%);
      color: #0a1730;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 500;
      font-size: 1rem;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(242, 196, 111, 0.3);
      border: none;
      cursor: pointer;
      animation: textFade 1.5s ease-out 0.6s both, buttonPulse 2s ease-in-out infinite 2s;
      position: relative;
      overflow: hidden;
    }
    .cta-button::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }
    .cta-button:hover::before { left: 100%; }
    .cta-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 35px rgba(242, 196, 111, 0.5);
    }
    @keyframes buttonPulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(242, 196, 111, 0.3); }
      50% { box-shadow: 0 4px 30px rgba(242, 196, 111, 0.6); }
    }

    .character-wrapper {
      flex: 0 0 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: textFade 1.5s ease-out 0.9s both;
    }
    .character {
      width: 240px; height: 280px;
      position: relative;
    }
    .head {
      position: absolute;
      top: 30px; left: 55px;
      width: 130px; height: 120px;
      background: #ffe8d6;
      border-radius: 50%;
      z-index: 5;
      box-shadow: inset -5px -5px 10px rgba(0,0,0,0.05);
    }
    .hair {
      position: absolute;
      top: 15px; left: 45px;
      width: 150px; height: 70px;
      background: #4a3426;
      border-radius: 50% 50% 40% 40%;
      z-index: 6;
    }
    .hair::before {
      content: '';
      position: absolute;
      top: -10px; left: 30px;
      width: 50px; height: 40px;
      background: #4a3426;
      border-radius: 50%;
    }
    .hair::after {
      content: '';
      position: absolute;
      top: -5px; left: 70px;
      width: 45px; height: 35px;
      background: #4a3426;
      border-radius: 50%;
    }
    .hair-bang {
      position: absolute;
      top: 35px; left: 60px;
      width: 40px; height: 25px;
      background: #5c4030;
      border-radius: 50%;
      z-index: 7;
    }
    .hair-bang::after {
      content: '';
      position: absolute;
      top: 5px; left: 35px;
      width: 35px; height: 22px;
      background: #5c4030;
      border-radius: 50%;
    }
    .ear {
      position: absolute;
      top: 85px;
      width: 18px; height: 18px;
      background: #ffe8d6;
      border-radius: 50%;
      z-index: 4;
    }
    .ear.left { left: 48px; }
    .ear.right { left: 174px; }
    .ear::after {
      content: '';
      position: absolute;
      top: 5px; left: 4px;
      width: 10px; height: 10px;
      background: #ffd5ba;
      border-radius: 50%;
    }
    .eye {
      position: absolute;
      top: 80px;
      width: 22px; height: 26px;
      background: #2d1f16;
      border-radius: 50%;
      z-index: 8;
      animation: blink 4s infinite;
    }
    .eye.left { left: 85px; }
    .eye.right { left: 133px; }
    .eye::before {
      content: '';
      position: absolute;
      top: 4px; left: 5px;
      width: 8px; height: 8px;
      background: white;
      border-radius: 50%;
    }
    .eye::after {
      content: '';
      position: absolute;
      top: 14px; left: 12px;
      width: 4px; height: 4px;
      background: white;
      border-radius: 50%;
    }
    @keyframes blink {
      0%, 96%, 100% { transform: scaleY(1); }
      98% { transform: scaleY(0.1); }
    }
    .nose {
      position: absolute;
      top: 108px; left: 118px;
      width: 6px; height: 4px;
      background: #e8b8a0;
      border-radius: 50%;
      z-index: 8;
    }
    .mouth {
      position: absolute;
      top: 115px; left: 108px;
      width: 24px; height: 12px;
      border-bottom: 3px solid #c97b7b;
      border-radius: 0 0 24px 24px;
      z-index: 8;
    }
    .cheek {
      position: absolute;
      top: 105px;
      width: 22px; height: 14px;
      background: rgba(255, 130, 130, 0.4);
      border-radius: 50%;
      z-index: 7;
      animation: blush 3s ease-in-out infinite;
    }
    .cheek.left { left: 68px; }
    .cheek.right { left: 150px; }
    @keyframes blush {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.7; }
    }
    .body {
      position: absolute;
      top: 140px; left: 85px;
      width: 70px; height: 65px;
      background: #5ba8c4;
      border-radius: 20px 20px 30px 30px;
      z-index: 4;
    }
    .body::after {
      content: '';
      position: absolute;
      top: 15px; left: 22px;
      width: 26px; height: 26px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
    }
    .arm {
      position: absolute;
      top: 148px;
      width: 28px; height: 45px;
      background: #ffe8d6;
      border-radius: 14px;
      z-index: 3;
      transform-origin: top center;
    }
    .arm.left {
      left: 58px;
      transform: rotate(-30deg);
      animation: armLeft 2s ease-in-out infinite;
    }
    .arm.right {
      left: 154px;
      transform: rotate(30deg);
      animation: armRight 2s ease-in-out infinite;
    }
    @keyframes armLeft {
      0%, 100% { transform: rotate(-30deg); }
      50% { transform: rotate(-60deg); }
    }
    @keyframes armRight {
      0%, 100% { transform: rotate(30deg); }
      50% { transform: rotate(60deg); }
    }
    .hand {
      position: absolute;
      top: 185px;
      width: 16px; height: 16px;
      background: #ffe8d6;
      border-radius: 50%;
      z-index: 3;
    }
    .hand.left { left: 42px; animation: handLeft 2s ease-in-out infinite; }
    .hand.right { left: 182px; animation: handRight 2s ease-in-out infinite; }
    @keyframes handLeft {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    @keyframes handRight {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    .dumbbell {
      position: absolute;
      top: 175px; left: 25px;
      width: 190px; height: 10px;
      background: #777;
      border-radius: 5px;
      z-index: 2;
      animation: barLift 2s ease-in-out infinite;
    }
    .dumbbell::before,
    .dumbbell::after {
      content: '';
      position: absolute;
      top: -12px;
      width: 26px; height: 34px;
      background: linear-gradient(135deg, #555 0%, #888 100%);
      border-radius: 6px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .dumbbell::before { left: -12px; }
    .dumbbell::after { right: -12px; }
    @keyframes barLift {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-22px); }
    }
    .shorts {
      position: absolute;
      top: 195px; left: 88px;
      width: 64px; height: 30px;
      background: #3d5a87;
      border-radius: 0 0 15px 15px;
      z-index: 4;
    }
    .leg {
      position: absolute;
      top: 220px;
      width: 22px; height: 35px;
      background: #ffe8d6;
      border-radius: 0 0 12px 12px;
      z-index: 3;
    }
    .leg.left { left: 95px; }
    .leg.right { left: 123px; }
    .shoe {
      position: absolute;
      top: 250px;

      border-radius: 14px 14px 6px 6px;

    .shoe.right { left: 120px; }
    .shoe::after {
      content: '';
      position: absolute;
      top: 4px; left: 6px;
      width: 16px; height: 6px;
      background: rgba(255,255,255,0.3);
      border-radius: 8px;
    }
    .sweat {
      position: absolute;
      width: 6px; height: 6px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      animation: drop 1.5s ease-in infinite;
    }
    .sweat.s1 { top: 50px; left: 180px; animation-delay: 0s; }
    .sweat.s2 { top: 70px; left: 40px; animation-delay: 0.5s; }
    .sweat.s3 { top: 130px; left: 190px; animation-delay: 0.8s; }
    @keyframes drop {
      0% { transform: translateY(0) rotate(-45deg) scale(1); opacity: 0.6; }

  <script>
    const hour = new Date().getHours();
    let greeting;
    if (hour >= 5 && hour < 12) {
      greeting = "Good morning";
    } else if (hour >= 12 && hour < 17) {
      greeting = "Good afternoon";
    } else if (hour >= 17 && hour < 21) {
      greeting = "Good evening";
    } else {
      greeting = "Good night";
    }
    document.getElementById('greeting').textContent = greeting + ", Professor.";

    function showCake() {
      document.getElementById('cakeOverlay').classList.add('active');
    }

    function blowCandle() {
      const flames = document.querySelectorAll('.flame');
      flames.forEach((f, i) => {
        setTimeout(() => f.classList.add('out'), i * 100);
      });
      
      setTimeout(() => {
        window.location.href = 'page2.html';
      }, 800);
    }
